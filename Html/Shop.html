<!DOCTYPE html>
<html lang="en">

<head>

    <!-- ==========================================================
         META
    =========================================================== -->

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <meta
        name="description"
        content="Browse premium masks, gloves, web shooters and collectibles from The Webbed Vault.">

    <meta
        name="theme-color"
        content="#0d1117">

    <title>Shop | The Webbed Vault</title>

    <!-- ==========================================================
         FAVICON
    =========================================================== -->

    <link
        rel="icon"
        type="image/png"
        href="../Images/Logo/Logo.png">

    <!-- ==========================================================
         GOOGLE FONTS
    =========================================================== -->

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- ==========================================================
         FONT AWESOME
    =========================================================== -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- ==========================================================
         CSS
    =========================================================== -->

    <link
        rel="stylesheet"
        href="../Style.css">

</head>

<body>

    <!-- ==========================================================
         HEADER
    =========================================================== -->

    <header class="header">

        <nav class="navbar">

            <!-- Logo -->

            <a
                href="../index.html"
                class="logo">

                <img
                    src="../Images/Logo/Logo.png"
                    alt="The Webbed Vault Logo">

            </a>

            <!-- Search -->

            <div class="nav-search">

                <input
                    id="searchInput"
                    type="search"
                    placeholder="Search masks, gloves, web shooters..."
                    autocomplete="off">

                <button
                    type="button">

                    <i class="fa-solid fa-magnifying-glass"></i>

                </button>

            </div>

            <!-- Navigation -->

            <ul class="nav-links">

                <li><a href="../index.html">Home</a></li>

                <li><a href="Shop.html" class="active">Shop</a></li>

                <li><a href="Masks.html">Masks</a></li>

                <li><a href="Gloves.html">Gloves</a></li>

                <li><a href="Webshooters.html">Web Shooters</a></li>

                <li><a href="Comics.html">Comics</a></li>

                <li><a href="Collectibles.html">Collectibles</a></li>

                <li><a href="Contact.html">Contact</a></li>

            </ul>

            <!-- Icons -->

            <div class="nav-icons">

                <a
                    href="Wishlist.html"
                    class="wishlist-icon">

                    <i class="fa-regular fa-heart"></i>

                    <span id="wishlistCount">0</span>

                </a>

                <a
                    href="Cart.html"
                    class="cart-icon">

                    <i class="fa-solid fa-cart-shopping"></i>

                    <span id="cartCount">0</span>

                </a>

            </div>

        </nav>

    </header>

    <main>

    <!-- ==========================================================
         SHOP HERO
    =========================================================== -->

    <section class="shop-header">

        <div class="shop-header-content">

            <nav class="breadcrumb">

                <a href="../index.html">Home</a>

                <span>/</span>

                <span>Shop</span>

            </nav>

            <span class="section-subtitle">

                THE WEBBED VAULT

            </span>

            <h1>

                Shop The Spider-Verse

            </h1>

            <p>

                Discover premium Spider-Man masks, gloves, web shooters,
                comics and collectibles made for fans and collectors.

            </p>

        </div>

    </section>

    <!-- ==========================================================
         SHOP TOOLBAR
    =========================================================== -->

    <section class="shop-toolbar">

        <div class="shop-search">

            <i class="fa-solid fa-magnifying-glass"></i>

            <input
                type="search"
                id="shopSearch"
                placeholder="Search products...">

        </div>

        <div class="shop-sort">

            <label for="sortProducts">

                Sort By

            </label>

            <select id="sortProducts">

                <option value="featured">Featured</option>

                <option value="newest">Newest</option>

                <option value="low-high">Price: Low to High</option>

                <option value="high-low">Price: High to Low</option>

                <option value="name">Alphabetical</option>

            </select>

        </div>

    </section>

    <!-- ==========================================================
         FILTERS
    =========================================================== -->

    <section class="shop-filters">

        <button class="filter-btn active" data-filter="All">

            All Products

        </button>

        <button class="filter-btn" data-filter="Masks">

            Masks

        </button>

        <button class="filter-btn" data-filter="Gloves">

            Gloves

        </button>

        <button class="filter-btn" data-filter="Web Shooters">

            Web Shooters

        </button>

        <button class="filter-btn" data-filter="Collectibles">

            Collectibles

        </button>

        <button class="filter-btn" data-filter="Comics">

            Comics

        </button>

    </section>

    <!-- ==========================================================
         RESULTS BAR
    =========================================================== -->

    <section class="results-bar">

        <p>

            Showing
            <strong id="productCount">0</strong>
            Products

        </p>

    </section>

    <!-- ==========================================================
         PRODUCTS
    =========================================================== -->

    <section class="shop-products">

        <div
            id="productsContainer"
            class="products-grid">

        </div>

    </section>

    <!-- ==========================================================
         LOAD MORE
    =========================================================== -->

    <section class="load-more-section">

        <button
            class="load-more-btn"
            id="loadMoreBtn">

            Load More Products

        </button>

    </section>

</main>

    <!-- ==========================================================
         JAVASCRIPT
    =========================================================== -->

    <script src="../js/products.js"></script>

    <script src="../js/store.js"></script>

    <script src="../js/cart.js"></script>

    <script src="../js/wishlist.js"></script>

    <script src="../js/shop.js"></script>

</body>

</html>
