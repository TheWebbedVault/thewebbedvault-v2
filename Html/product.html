<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Product | The Webbed Vault</title>

    <link rel="stylesheet" href="../Style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<nav class="navbar">

    <a href="../index.html" class="logo">

        <img src="../Images/Logo/Logo.png" alt="The Webbed Vault">

    </a>

    <ul class="nav-links">

        <li><a href="../index.html">Home</a></li>
        <li><a href="Shop.html">Shop</a></li>

    </ul>

</nav>

<main class="product-page">

    <div class="product-gallery">

        <img id="mainImage" src="" alt="Product Image">

        <div id="thumbnails" class="thumbnails"></div>

    </div>

    <div class="product-info">

    <span id="productBadge"></span>

    <h1 id="productName"></h1>

    <p id="productPrice"></p>

    <p id="productDescription"></p>

    <div class="product-features">

        <h3>Features</h3>

        <ul id="productFeatures"></ul>

    </div>

    <div class="shipping-box">

        <h3>Shipping</h3>

        <p id="productShipping"></p>

        <h3>Returns</h3>

        <p id="productReturns"></p>

    </div>

    <button class="cart-btn">
        🛒 Add to Cart
    </button>

    <button class="wishlist-btn">
        ❤️ Wishlist
    </button>

</div>

</main>

<script src="../js/products.js"></script>
<script src="../js/product.js"></script>

</body>
</html>
